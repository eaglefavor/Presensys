<!DOCTYPE html>
<html>
<head>
  <link href="node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary-blue: #006994; /* Sea Blue */
      --primary-blue-focus: rgba(0, 105, 148, 0.15); /* Focus ring tint */
    }
    .form-select {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23006994' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e") !important;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .form-select:focus {
      border-color: var(--primary-blue) !important;
      box-shadow: 0 0 0 2px var(--primary-blue-focus) !important;
      outline: none !important;
    }
  </style>
</head>
<body class="p-5">
  <select class="form-select">
    <option>Test</option>
  </select>
</body>
</html>
